name: Release binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:   # allow manual test runs

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: cleanup-linux-x64
            bin: cleanup
          - os: macos-latest
            asset: cleanup-macos-arm64
            bin: cleanup
          - os: windows-latest
            asset: cleanup-windows-x64.exe
            bin: cleanup.exe
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash   # use bash on all OSes (Git Bash on Windows) for uniform steps

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pyinstaller>=6"

      - name: Build standalone binary
        run: bash scripts/build_binary.sh

      - name: Smoke test
        run: ./dist/${{ matrix.bin }} --help

      - name: Name the artifact
        run: mv "dist/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
